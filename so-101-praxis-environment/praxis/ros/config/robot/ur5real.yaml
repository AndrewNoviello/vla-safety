# @package robot

_target_: praxis.robots.ur5real.UR5Real
config:
  name: "ur5real"
  dof: 6
  init_joint_positions: [1.5708, -1.5708, 1.5708, -1.5708, -1.5708, 0]
  joint_limits_lower: [-6.2832, -6.2832, -6.2832, -6.2832, -6.2832, -6.2832]
  joint_limits_upper: [6.2832, 6.2832, 6.2832, 6.2832, 6.2832, 6.2832]
  
  # Robot connection
  robot_ip: "192.168.1.10"  # Change this to your robot's IP address
  
  # Control parameters
  velocity: 0.1  # rad/s for joint control
  acceleration: 0.2  # rad/s^2 for joint control
  ee_velocity: 0.1  # m/s for end-effector control
  ee_acceleration: 0.1  # m/s^2 for end-effector control
  
  # Safety parameters
  blend_radius: 0.0
  dt: 0.02
  lookahead_time: 0.1
  gain: 300

